<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Atualizador de firmware Guerrilha Pedais por USB — escolhe a tua linha MT ou MT-S." />
  <title>Guerrilha Pedais — Atualizador de firmware</title>
  <link rel="icon" href="assets/logo_final.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="home-page">
  <a class="skip-link" href="#main">Saltar para o conteúdo</a>
  <div class="layout layout--home">
    <header class="home-hero" role="banner">
      <div class="home-hero__glow" aria-hidden="true"></div>
      <div class="home-hero__inner">
        <img
          class="home-hero__logo"
          src="assets/logo_final.png"
          width="96"
          height="96"
          alt="Guerrilha Pedais"
          decoding="async"
          fetchpriority="high"
          onerror="this.style.display='none'"
        />
        <p class="home-hero__eyebrow">Atualização por USB</p>
        <h1 class="home-hero__title">Guerrilha Pedais</h1>
        <p class="home-hero__sub">Escolhe o modelo do teu controlador.</p>
      </div>
    </header>

    <main id="main" class="product-picker" tabindex="-1" aria-label="Escolher linha do controlador">
      <a href="mt.html" class="product-card product-card--mt" aria-label="MT-Series — abrir atualizador">
        <h2 class="product-card__title">MT-Series</h2>
      </a>

      <a href="mt-s.html" class="product-card product-card--mts" aria-label="MT-S Series — abrir atualizador">
        <h2 class="product-card__title">MT-S Series</h2>
      </a>
    </main>

    <p class="home-hint">
      Usa <strong>Google Chrome</strong> ou <strong>Microsoft Edge</strong>. Nada é enviado para a Internet — a gravação é local por USB.
    </p>

    <footer>
      <p>Guerrilha Pedais — atualização de firmware por USB.</p>
    </footer>
  </div>
</body>
</html>
